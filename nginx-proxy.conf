# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name cloudbuild.tech www.cloudbuild.tech;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Main Website
server {
    listen 443 ssl;
    server_name cloudbuild.tech www.cloudbuild.tech;

    ssl_certificate     /etc/letsencrypt/live/cloudbuild.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloudbuild.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # API → admin container
    location /api/ {
        proxy_pass http://admin:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads → admin container
    location /uploads/ {
        proxy_pass http://admin:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# HTTPS — Admin Panel
server {
    listen 443 ssl;
    server_name admin.cloudbuild.tech;

    ssl_certificate     /etc/letsencrypt/live/cloudbuild.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloudbuild.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://admin:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
