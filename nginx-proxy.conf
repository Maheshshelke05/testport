# HTTP → HTTPS redirect + certbot challenge
server {
    listen 80;
    server_name maheshbhau.xyz www.maheshbhau.xyz admin.maheshbhau.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Main Website
server {
    listen 443 ssl;
    server_name maheshbhau.xyz www.maheshbhau.xyz;

    ssl_certificate     /etc/letsencrypt/live/maheshbhau.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maheshbhau.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass         http://cloudbuild_admin:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location /uploads/ {
        proxy_pass         http://cloudbuild_admin:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location / {
        proxy_pass         http://cloudbuild_frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}

# HTTPS — Admin Panel
server {
    listen 443 ssl;
    server_name admin.maheshbhau.xyz;

    ssl_certificate     /etc/letsencrypt/live/maheshbhau.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maheshbhau.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://cloudbuild_admin:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
